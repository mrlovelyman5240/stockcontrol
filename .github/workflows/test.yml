name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend (vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  backend-compile-and-collect:
    name: Backend (compile + pytest --collect-only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Compile-check all .py
        run: python -m compileall -q .
      - name: Verify pytest can collect tests (catches syntax/import errors)
        run: python -m pytest --collect-only -q
        env:
          # Tests read this for the API base URL; collection doesn't run the
          # requests, but importing the test modules must not blow up.
          REACT_APP_BACKEND_URL: http://localhost:8001
          JWT_SECRET: ci-collect-only-not-a-real-secret
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: ci_collect
          CORS_ORIGINS: http://localhost:3000

  # NOTE: full integration tests (test_base_stock_tracking, test_security_fixes,
  # test_ui_cleanup_v6 etc.) hit a live API and need a running backend + MongoDB.
  # When ready, add a job that starts mongo via services: + boots uvicorn, then
  # runs `pytest` against http://localhost:8001.
