<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#059669" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Mixy Logistics - Complete delivery management system for businesses" />

    <!-- PWA Meta Tags. manifest.webmanifest is generated by vite-plugin-pwa at build time. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mixy Logistics" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Mixy Logistics</title>

    <style>
      /* Prevent FOUC */
      html { visibility: hidden; }
      html.loaded { visibility: visible; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script type="module" src="/src/index.js"></script>

    <script>
      // Prevent FOUC. Service worker registration is handled by vite-plugin-pwa
      // via the useRegisterSW hook in PWAUpdatePrompt.
      document.documentElement.classList.add('loaded');
    </script>
  </body>
</html>
